<!-- La clase `reduce-motion` se añade al body si el switch está activado. -->
<body [class.reduce-motion]="reduceMotionEnabled">

  <!-- Menú y Modal (SIN CAMBIOS) -->
  <div class="menu-container" [class.menu-open]="isMenuOpen">
      <!-- ... todo el contenido del menú, header y modal queda exactamente igual ... -->
      <div class="header">
          <div class="header-left">
            <img src="assets/iluminati.png" alt="Logo de la Marca" class="header-logo-small" />
          </div>
          <div class="header-right">
            <div class="menu-icon" (click)="toggleMenu()">
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
        <div class="side-menu" [class.motion-modal-open]="isMotionModalOpen">
          <header class="menu-header">
            <nav class="menu-pills">
              <a href="#" class="active">Inicio</a>
              <a href="#">Mision</a>
              <a href="#">Proyectos</a>
              <a href="#">Contactanos</a>
            </nav>
            <div class="close-icon-container" (click)="toggleMenu()">
              <div class="close-icon">×</div>
            </div>
          </header>
          <main class="menu-body"></main>
          <footer class="menu-footer">
            <div class="footer-item">
              <span class="icon-globe">🌐</span><span>Español</span><span class="icon-arrow">^</span>
            </div>
            <div class="footer-item" (click)="toggleMotionModal()">
              <span>Movimiento</span><span class="icon-arrow">^</span>
            </div>
          </footer>
          <div class="motion-modal-overlay" (click)="toggleMotionModal()">
            <div class="motion-modal-box" (click)="$event.stopPropagation()">
              <div class="modal-content">
                <h3>Reducir movimiento</h3>
                <p>Reduce al mínimo las animaciones, los efectos dinámicos y el movimiento visual para aumentar
                  el rendimiento.</p>
              </div>
              <div class="modal-toggle">
                <label class="toggle-switch">
                  <input type="checkbox" class="toggle-switch-checkbox" [checked]="reduceMotionEnabled"
                    (change)="toggleReduceMotion()">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>
        <div class="menu-open-logo-container">
          <img src="assets/iluminati.png" alt="Logo Central" class="menu-open-logo" />
        </div>
  </div>

  <!-- Contenedor principal que se verá afectado por .reduce-motion -->
  <main #pinContainer class="pin-container">

    <!-- ======================================================= -->
    <!-- === SECCIÓN #1: HERO INICIAL (PARA MODO ESTÁTICO) === -->
    <!-- ======================================================= -->
    <div class="static-section hero-section">
      <picture #heroBackground class="hero-background-scene">
        <img src="assets/imagen.png" alt="Paisaje de fondo" />
      </picture>
      
      <!-- Elementos intermedios de la animación -->
      <div #blackOverlay class="hero-black-overlay">
        <div #heroImageMask class="hero-masked-content">
          <img src="assets/imagen.png" alt="Fondo enmascarado" />
        </div>
        <div #heroWhiteMask class="hero-masked-content-white"></div>
      </div>
      
      <!-- Footer que se debe ver en la primera sección del modo estático -->
      <footer #heroFooter class="hero-footer">
        <img src="assets/iluminati.png" alt="Logo Inferior" class="footer-logo" />
        <img src="assets/title.png" alt="Título de la Marca" class="footer-logo-title" />
        <span class="footer-logo-text">Ver Más</span>
      </footer>
    </div>


    <!-- ============================================================== -->
    <!-- === SECCIÓN #2: CONTENIDO FINAL (PARA MODO ESTÁTICO) === -->
    <!-- ============================================================== -->
    <div class="static-section content-section">

      <!-- CAMBIO CLAVE: El logo final ahora vive DENTRO de la segunda sección -->
      <div #finalLogo class="final-logo-container-gsap">
        <img src="assets/logo-letras-blancas.png" alt="Logo Final" />
      </div>

      <!-- Contenedor del contenido final -->
      <div class="final-content-container">
        <div class="vignette-shadow" #startupShadow></div>
        <div class="startup-text" #startupContent>
          <h1>Startup Colombiana<br />2025</h1>
        </div>
        <div class="nombres" #namesContainer>
          <h2>Inteligencia</h2>
          <h2>Desarrollo</h2>
          <h2>Seguridad</h2>
        </div>
      </div>
    </div>
    
  </main>
</body>
